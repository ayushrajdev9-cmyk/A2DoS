# defense.conf — uncomment to enable Nginx-level protections
# Enable AFTER seeing the attack work against the unprotected server

# Rate limiting: max 30 req/s per IP, burst up to 50
# limit_req_zone $binary_remote_addr zone=flood:10m rate=30r/s;
# limit_req zone=flood burst=50 nodelay;

# Connection limiting: max 10 concurrent connections per IP
# limit_conn_zone $binary_remote_addr zone=addr:10m;
# limit_conn addr 10;
