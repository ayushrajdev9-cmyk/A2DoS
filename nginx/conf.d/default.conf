server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # ponytail: no rate limiting initially
    # Uncomment below AFTER seeing the flood work:
    # limit_req zone=flood burst=20 nodelay;
    # limit_conn addr 10;

    location / {
        try_files $uri $uri/ =404;
    }
}
